name: Build Bondhumohol Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Init npm & install Capacitor + plugins
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem

    - name: Create Capacitor config
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.bondhumohol.foundation",
          "appName": "বন্ধুমহল ফাউন্ডেশন",
          "webDir": "www",
          "server": {
            "androidScheme": "https"
          }
        }
        EOF

    - name: Prepare www folder
      run: |
        mkdir -p www
        cp index.html www/index.html

    - name: Add Android Platform
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install imagemagick
      run: sudo apt-get install -y imagemagick

    - name: Generate Android Icons from icon.png
      run: |
        if [ ! -f icon.png ]; then
          echo "⚠️ icon.png পাওয়া যায়নি"
          exit 0
        fi

        echo "✅ icon.png পাওয়া গেছে — সব সাইজ তৈরি হচ্ছে..."

        MIPMAP="android/app/src/main/res"

        # ফোল্ডার নিশ্চিত করো
        mkdir -p $MIPMAP/mipmap-mdpi
        mkdir -p $MIPMAP/mipmap-hdpi
        mkdir -p $MIPMAP/mipmap-xhdpi
        mkdir -p $MIPMAP/mipmap-xxhdpi
        mkdir -p $MIPMAP/mipmap-xxxhdpi

        # কালো ব্যাকগ্রাউন্ড সরিয়ে শুধু circle রাখো, তারপর resize
        convert icon.png -fuzz 10% -trim +repage icon-trimmed.png

        # সব সাইজ generate
        convert icon-trimmed.png -resize 48x48   $MIPMAP/mipmap-mdpi/ic_launcher.png
        convert icon-trimmed.png -resize 48x48   $MIPMAP/mipmap-mdpi/ic_launcher_round.png
        convert icon-trimmed.png -resize 72x72   $MIPMAP/mipmap-hdpi/ic_launcher.png
        convert icon-trimmed.png -resize 72x72   $MIPMAP/mipmap-hdpi/ic_launcher_round.png
        convert icon-trimmed.png -resize 96x96   $MIPMAP/mipmap-xhdpi/ic_launcher.png
        convert icon-trimmed.png -resize 96x96   $MIPMAP/mipmap-xhdpi/ic_launcher_round.png
        convert icon-trimmed.png -resize 144x144 $MIPMAP/mipmap-xxhdpi/ic_launcher.png
        convert icon-trimmed.png -resize 144x144 $MIPMAP/mipmap-xxhdpi/ic_launcher_round.png
        convert icon-trimmed.png -resize 192x192 $MIPMAP/mipmap-xxxhdpi/ic_launcher.png
        convert icon-trimmed.png -resize 192x192 $MIPMAP/mipmap-xxxhdpi/ic_launcher_round.png

        # foreground layer (adaptive icon)
        mkdir -p $MIPMAP/mipmap-anydpi-v26
        convert icon-trimmed.png -resize 108x108 $MIPMAP/mipmap-mdpi/ic_launcher_foreground.png
        convert icon-trimmed.png -resize 162x162 $MIPMAP/mipmap-hdpi/ic_launcher_foreground.png
        convert icon-trimmed.png -resize 216x216 $MIPMAP/mipmap-xhdpi/ic_launcher_foreground.png
        convert icon-trimmed.png -resize 324x324 $MIPMAP/mipmap-xxhdpi/ic_launcher_foreground.png
        convert icon-trimmed.png -resize 432x432 $MIPMAP/mipmap-xxxhdpi/ic_launcher_foreground.png

        echo "✅ সব আইকন তৈরি হয়েছে"
        ls -la $MIPMAP/mipmap-xxhdpi/

    - name: Set App Name
      run: |
        STRINGS="android/app/src/main/res/values/strings.xml"
        sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">বন্ধুমহল ফাউন্ডেশন<\/string>/' $STRINGS

    - name: Inject Permissions
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.CAMERA" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-feature android:name="android.hardware.camera" android:required="false" \/>\n<\/manifest>/' $MANIFEST

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: bondhumohol-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
