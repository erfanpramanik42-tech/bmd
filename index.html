<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বন্ধুমহল - Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Floating bubbles */
        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .bubbles span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        @keyframes animate {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) scale(0.5);
                opacity: 0;
            }
        }

        /* Different sizes & speeds */
        .bubbles span:nth-child(1) { left: 10%; width: 15px; height: 15px; animation-duration: 18s; }
        .bubbles span:nth-child(2) { left: 20%; width: 25px; height: 25px; animation-duration: 22s; }
        .bubbles span:nth-child(3) { left: 30%; animation-duration: 20s; }
        .bubbles span:nth-child(4) { left: 40%; width: 30px; height: 30px; animation-duration: 25s; }
        .bubbles span:nth-child(5) { left: 50%; animation-duration: 19s; }
        .bubbles span:nth-child(6) { left: 60%; width: 18px; height: 18px; animation-duration: 21s; }
        .bubbles span:nth-child(7) { left: 70%; animation-duration: 17s; }
        .bubbles span:nth-child(8) { left: 80%; width: 22px; height: 22px; animation-duration: 23s; }
        .bubbles span:nth-child(9) { left: 90%; animation-duration: 20s; }
        .bubbles span:nth-child(10){ left: 25%; width: 28px; height: 28px; animation-duration: 24s; }

        /* Content box */
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }

    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="bubbles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1>বন্ধুমহল</h1>
        <p>🚧 আমাদের ওয়েবসাইট বর্তমানে নির্মাণাধীন 🚧</p>

        <div class="loader"></div>

        <p>আমরা খুব দ্রুত একটি নতুন ও আকর্ষণীয় প্ল্যাটফর্ম নিয়ে আসছি।  
        আপনার ধৈর্যের জন্য ধন্যবাদ ❤️</p>

        <div class="footer">
            © 2026 বন্ধুমহল
        </div>
    </div>

</body>
</html>
